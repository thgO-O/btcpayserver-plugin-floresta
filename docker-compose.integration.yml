name: btcpay-floresta-plugin-integration

services:
  floresta:
    image: ${FLORESTA_IMAGE:-dlsz/floresta@sha256:f242ca3d6a765d9f61f141363d710a999392cc0d6db6ade8052a70da936abd6a}
    platform: ${FLORESTA_PLATFORM:-linux/amd64}
    command:
      - florestad
      - --network
      - regtest
      - --data-dir
      - /data
      - --rpc-address
      - 0.0.0.0:18442
      - --electrum-address
      - 0.0.0.0:20001
      - --filters-start-height
      - "0"
      - --no-backfill
    expose:
      - "18442"
      - "20001"
    ports:
      - "${FLORESTA_RPC_BIND:-127.0.0.1}:${FLORESTA_RPC_PORT:-18442}:18442"
      - "${FLORESTA_ELECTRUM_BIND:-127.0.0.1}:${FLORESTA_ELECTRUM_PORT_HOST:-20001}:20001"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "floresta-cli", "--network", "regtest", "--rpc-host", "http://127.0.0.1:18442", "ping"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s

  dev:
    image: alpine:3.20
    profiles: ["full"]
    command:
      - /bin/sh
      - -c
      - |
        trap : TERM INT
        while :; do
          echo "Floresta regtest infrastructure is ready."
          sleep 2073600
        done & wait
    depends_on:
      floresta:
        condition: service_healthy
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_healthy
      utreexod:
        condition: service_healthy

  postgres:
    image: postgres:16
    profiles: ["full"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: btcpayserver
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-39372}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d btcpayserver"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s

  bitcoind:
    image: btcpayserver/bitcoin:31.0
    profiles: ["full"]
    environment:
      BITCOIN_NETWORK: regtest
      BITCOIN_WALLETDIR: "/data/wallets"
      BITCOIN_EXTRA_ARGS: |-
        rpcuser=ceiwHEbqWI83
        rpcpassword=DwubwWsoo3
        rpcport=43782
        rpcbind=0.0.0.0:43782
        rpcallowip=0.0.0.0/0
        port=39388
        whitelist=0.0.0.0/0
        fallbackfee=0.0002
        minrelaytxfee=0.00001000
        unsafesqlitesync=1
    expose:
      - "43782"
      - "39388"
    ports:
      - "${BITCOIND_RPC_BIND:-127.0.0.1}:${BITCOIND_RPC_PORT:-43782}:43782"
      - "${BITCOIND_P2P_BIND:-127.0.0.1}:${BITCOIND_P2P_PORT:-39388}:39388"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s

  utreexod:
    build:
      context: .
      dockerfile: docker/utreexod/Dockerfile
      args:
        UTREEXOD_REPO: ${UTREEXOD_REPO:-https://github.com/utreexo/utreexod.git}
        UTREEXOD_REF: ${UTREEXOD_REF:-main}
    profiles: ["full"]
    command:
      - utreexod
      - --regtest
      - --datadir=/data
      - --rpcuser=test
      - --rpcpass=test
      - --rpclisten=0.0.0.0:38332
      - --listen=0.0.0.0:38333
      - --utreexoproofindex
      - --prune=0
    expose:
      - "38332"
      - "38333"
    ports:
      - "${UTREEXOD_RPC_BIND:-127.0.0.1}:${UTREEXOD_RPC_PORT:-38332}:38332"
      - "${UTREEXOD_P2P_BIND:-127.0.0.1}:${UTREEXOD_P2P_PORT:-38333}:38333"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --insecure --user test:test --header 'content-type: application/json' --data-binary '{\"jsonrpc\":\"1.0\",\"id\":\"health\",\"method\":\"getblockchaininfo\",\"params\":[]}' https://127.0.0.1:38332/ >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s
